# The groupName here is used to identify the company or business unit that
# created this webhook.
# This name will need to be referenced in each Issuer's `webhook` stanza to
# inform cert-manager of where to send ChallengePayload resources in order to
# solve the DNS01 challenge.
# Users should not generally need to edit the groupName.
groupName: acme.constellix.com

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

image:
  repository: bpicio/cert-manager-webhook-constellix
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# The (secure) port our app binds to
containerPort: 8443

service:
  type: ClusterIP
  port: 443

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for users. If you do want to specify resources, uncomment the following
  # lines, adjust as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

# Pod-level security context (matches distroless nonroot image UID/GID 65532:65532)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Optional: spread pods across nodes/zones when replicaCount > 1
topologySpreadConstraints: []

nodeSelector: {}

tolerations: []

affinity: {}
